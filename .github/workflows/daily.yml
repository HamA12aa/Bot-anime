name: Daily Anime News
on:
  schedule:
    # ئەمە وا دەکات هەموو ڕۆژێک کاتژمێر ٨:٠٠ی بەیانی بە کاتی UTC (١١ بەیانی کوردستان) کار بکات
    - cron: '0 8 * * *'
  workflow_dispatch: # ئەمە بۆ ئەوەیە بتوانیت بە دەستیش تاقی بکەیتەوە

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
